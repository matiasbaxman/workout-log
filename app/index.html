<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Log</title>
    <!-- Compiled Tailwind + DaisyUI CSS -->
    <link rel="stylesheet" href="styles/tailwind.css" />
  </head>
  <body>
    <!-- ALL THE CONTENT IN THIS BOX -->
    <div class="max-w-7xl mx-auto">
      <!-- NOW THE COMPONENTS :) -->

      <nav class="bg-neutral-primary w-full z-20 top-0 start-0 bg-black bg-o">
        <div class="max-w-7xl mx-auto px-4">
          <div class="flex items-center justify-between h-16">
            <div class="flex items-center">
              <span class="text-black font-bold text-xl">Workout Log</span>
            </div>
          </div>
        </div>
      </nav>

      <!-- THE MAIN CONTENT (ALL THE WEB IN HERE) -->
      <main class="p-4">
        <div class="max-w-md mx-auto">
          <h1 class="text-2xl font-bold mb-4">Today's Workout</h1>

          <button id="workout-btn" class="btn btn-primary w-full">
            Entrené hoy
          </button>

          <div id="log" class="mt-4"></div>

          <button id="clear-btn" class="btn btn-danger w-full">
            Borrar log
          </button>
        </div>
      </main>

      <footer>
        <p>&copy; 2026 Workout Log. All rights reserved.</p>
      </footer>
    </div>

    <!-- Local JS file -->
    <script src="app.js"></script>
  </body>
</html>
